[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
restartPolicyType = "on-failure"

[[services]]
name = "api"
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[[services]]
name = "scheduler"
startCommand = "python scheduler.py"
